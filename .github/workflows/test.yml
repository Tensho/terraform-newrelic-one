name: Test

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'

# Tests apply real resources against the shared Example sub-account, so every
# run across every branch must serialize. A static group (queuing, not
# cancelling) stops two runs from racing on the same account.
concurrency:
  group: newrelic-integration-test
  cancel-in-progress: false

env:
  NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
  NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
  NEW_RELIC_REGION: ${{ vars.NEW_RELIC_REGION }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TF_INPUT: false
    strategy:
      fail-fast: false
      # Matrix legs share the account too; run one at a time.
      max-parallel: 1
      matrix:
        module:
          - alert-policies
          - alert-notifications
          - dashboards
          - synthetic-monitors
          - account-management
          - entities
          - api-access-key
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Test ${{ matrix.module }}
        run: terraform init && terraform test
        working-directory: ./modules/${{ matrix.module }}
