formatter: "markdown table"

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  # Read the provider version from the required_providers constraint
  # (e.g. ~> 3.0) instead of the resolved version in .terraform.lock.hcl,
  # which is gitignored and would otherwise churn the docs on every run.
  lockfile: false
